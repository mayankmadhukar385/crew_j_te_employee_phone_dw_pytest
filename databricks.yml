bundle:
  name: datastage-etl-framework

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: ${DATABRICKS_HOST}
    variables:
      catalog: dev_catalog
      schema: etl_dev

  production:
    mode: production
    workspace:
      host: ${DATABRICKS_HOST}
    variables:
      catalog: prod_catalog
      schema: etl_prod
    permissions:
      - group_name: "data-engineering"
        level: CAN_MANAGE
      - group_name: "data-ops"
        level: CAN_VIEW

sync:
  include:
    - "framework/**"
    - "jobs/**"
    - "notebooks/**"

